name: Sync LeetCode

on:
workflow_dispatch:
schedule:
 - cron: "0 8 * * 6"   # Runs every Saturday at 8 AM UTC

env:
FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
sync:
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Sync LeetCode submissions
    uses: LeetCodeSync/LeetCode-Sync-Action@v1.5
    with:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      leetcode-session: ${{ secrets.LEETCODE_SESSION }}
      csrf-token: ${{ secrets.CSRF_TOKEN }}
      destination-folder: leetcode
      commit-message: "Sync LeetCode submissions"
